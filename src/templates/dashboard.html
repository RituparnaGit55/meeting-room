{% extends 'base.html' %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h1 class="mb-4">Welcome, {{ user.first_name|default:user.email }}!</h1>
    </div>
</div>
<div class="row g-4">
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-body text-center">
                <i class="bi bi-calendar-event display-4 text-primary mb-3"></i>
                <h3 class="card-title">Meetings</h3>
                <p class="card-text">Schedule and join meetings</p>
                <button class="btn btn-primary">Create Meeting</button>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-body text-center">
                <i class="bi bi-clipboard-check display-4 text-success mb-3"></i>
                <h3 class="card-title">Tasks</h3>
                <p class="card-text">Manage your tasks</p>
                <button class="btn btn-success">View Tasks</button>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-body text-center">
                <i class="bi bi-bar-chart display-4 text-info mb-3"></i>
                <h3 class="card-title">Analytics</h3>
                <p class="card-text">View analytics and reports</p>
                <button class="btn btn-info text-white">View Analytics</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
