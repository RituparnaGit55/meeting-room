{% extends 'base.html' %}

{% block title %}MeetFlow | Join Meeting{% endblock %}

{% block content %}
<div class="row justify-content-center py-4">
    <div class="col-md-10 col-lg-6">
        <div class="glass-card-light p-5 fade-in-up">
            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px; border-radius: 24px; background: var(--warning-gradient);">
                    <i class="bi bi-door-open-fill text-white" style="font-size: 2.5rem;"></i>
                </div>
                <h2 class="text-gradient fw-bold">Join Meeting</h2>
                <p class="text-muted mt-2">Enter the room code to join</p>
            </div>
            
            <form id="joinMeetingForm" class="fade-in-up delay-1" autocomplete="off">
                {% csrf_token %}
                
                <div id="joinMeetingError" class="alert alert-danger rounded-3 d-none p-2 mb-3" style="font-size: 0.9rem;" role="alert"></div>

                <div class="mb-4">
                    <label class="form-label">
                        <i class="bi bi-key me-2"></i>Room Code / Meeting ID
                    </label>
                    <input type="text" class="form-control" id="roomCode" name="roomCode" required value="{{ room_code }}" placeholder="Enter room code or meeting ID" autocomplete="off" spellcheck="false">
                </div>

                <div class="mb-4">
                    <label class="form-label">
                        <i class="bi bi-lock me-2"></i>Password (if required)
                    </label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Leave blank if none" autocomplete="new-password">
                </div>

                {% if not user.is_authenticated %}
                    <div class="mb-4">
                        <label class="form-label">
                            <i class="bi bi-person me-2"></i>Your Name
                        </label>
                        <input type="text" class="form-control" id="guestName" name="guestName" required placeholder="Enter your name">
                    </div>
                {% endif %}

                <button type="submit" id="joinSubmitBtn" class="btn-gradient-warning w-100 py-3 fs-5">
                    <i class="bi bi-door-open me-2"></i><strong>Join</strong> Meeting
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const joinMeetingForm = document.getElementById('joinMeetingForm');
const joinMeetingError = document.getElementById('joinMeetingError');
const joinSubmitBtn = document.getElementById('joinSubmitBtn');

function showError(msg) {
    joinMeetingError.textContent = msg;
    joinMeetingError.classList.remove('d-none');
}

function clearError() {
    joinMeetingError.textContent = '';
    joinMeetingError.classList.add('d-none');
}

joinMeetingForm.addEventListener('submit', async function(e) {
    e.preventDefault();
    clearError();
    
    const inputVal = document.getElementById('roomCode').value.trim();
    const password = document.getElementById('password').value;
    const guestNameInput = document.getElementById('guestName');
    const guestName = guestNameInput ? guestNameInput.value.trim() : '';

    if (!inputVal) {
        showError('Please enter a room code or meeting ID');
        return;
    }

    joinSubmitBtn.disabled = true;

    // Distinguish between Room Code (12-char hex) and Meeting ID
    const payload = {};
    if (inputVal.length === 12 && /^[0-9a-fA-F]+$/.test(inputVal)) {
        payload.room_code = inputVal;
    } else {
        payload.meeting_id = inputVal;
    }
    
    if (password) payload.password = password;
    if (guestName) payload.guest_name = guestName;

    try {
        const response = await fetch('/meetings/api/join/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken')
            },
            body: JSON.stringify(payload)
        });

        const result = await response.json();
        if (response.ok) {
            // Redirect using the validated room_code from database
            window.location.href = `/meetings/room/${result.meeting.room_code}/`;
        } else {
            showError(result.error || 'Failed to join meeting. Please verify details.');
        }
    } catch (err) {
        console.error(err);
        showError('An unexpected error occurred. Please try again.');
    } finally {
        joinSubmitBtn.disabled = false;
    }
});

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.startsWith(name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
</script>
{% endblock %}
