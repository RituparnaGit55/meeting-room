{% extends 'base.html' %}

{% block title %}MeetFlow | My Meetings{% endblock %}

{% block content %}
<div class="py-4">
    <div class="d-flex justify-content-between align-items-center mb-4 fade-in-up">
        <h1 class="fw-bold" style="color: var(--text-dark);"><i class="bi bi-calendar-event me-3 text-gradient"></i>My Meetings</h1>
        <a href="{% url 'create-meeting' %}" class="btn-gradient-primary px-4 py-2">
            <i class="bi bi-plus-circle me-2"></i>New Meeting
        </a>
    </div>

    <div class="row" id="meetingsList">
        <div class="col-12 text-center py-5">
            <div class="spinner-border" role="status" style="color: #667eea; width: 4rem; height: 4rem;">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
async function loadMeetings() {
    const meetingsList = document.getElementById('meetingsList');

    try {
        const response = await fetch('/meetings/api/');

        if (!response.ok) {
            if (response.status === 401 || response.status === 403) {
                window.location.href = "{% url 'login' %}";
                return;
            }
            throw new Error(`Request failed with status ${response.status}`);
        }

        const data = await response.json();
        const meetings = Array.isArray(data) ? data : (data.results || []);
        meetingsList.innerHTML = '';

        if (meetings.length === 0) {
            meetingsList.innerHTML = `
                <div class="col-12 text-center py-5 fade-in-up">
                    <div class="glass-card-light p-5">
                        <i class="bi bi-calendar-x" style="font-size: 5rem; color: #667eea;"></i>
                        <h3 class="text-dark mt-3 mb-3">No meetings yet</h3>
                        <p class="text-muted mb-4">Create your first meeting and get started!</p>
                        <a href="{% url 'create-meeting' %}" class="btn-gradient-primary px-5 py-2">
                            <i class="bi bi-plus-circle me-2"></i>Create Meeting
                        </a>
                    </div>
                </div>
            `;
            return;
        }

        meetings.forEach((meeting, index) => {
            const card = document.createElement('div');
            card.className = 'col-md-6 mb-4 fade-in-up';
            card.style.animationDelay = (index * 0.1) + 's';
            card.innerHTML = `
                <div class="meeting-item">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div>
                            <h5 class="fw-bold mb-1" style="color: var(--text-dark);"><i class="bi bi-calendar-check me-2 text-gradient"></i>${meeting.title}</h5>
                            <p class="text-muted mb-0 small">${meeting.description || 'No description provided'}</p>
                        </div>
                        <span class="badge rounded-pill" style="background: var(--primary-gradient);">${meeting.meeting_type}</span>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <p class="mb-1 text-muted small"><i class="bi bi-calendar me-2"></i>Start Time</p>
                            <p class="fw-bold mb-0">${new Date(meeting.start_time).toLocaleString()}</p>
                        </div>
                        <div class="col-md-6">
                            <p class="mb-1 text-muted small"><i class="bi bi-key me-2"></i>Room Code</p>
                            <p class="fw-bold mb-0" style="color: var(--text-dark);">${meeting.room_code}</p>
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <a href="/meetings/room/${meeting.room_code}/" class="btn-gradient-primary flex-grow-1">
                            <i class="bi bi-door-open me-2"></i><strong style="color: red;">Join</strong>
                        </a>
                        <button class="btn-outline-glass" onclick="copyToClipboard('${meeting.room_code}')">
                            <i class="bi bi-clipboard"></i>
                        </button>
                    </div>
                </div>
            `;
            meetingsList.appendChild(card);
        });
    } catch (error) {
        console.error('Error loading meetings:', error);
        meetingsList.innerHTML = `
            <div class="col-12 text-center py-5 fade-in-up">
                <div class="alert alert-danger rounded-4">
                    <i class="bi bi-exclamation-triangle me-2"></i>Unable to load your meetings right now. Please refresh the page and try again.
                </div>
            </div>
        `;
    }
}

function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(() => {
        alert('Room code copied to clipboard!');
    }).catch(err => {
        console.error('Failed to copy:', err);
    });
}

document.addEventListener('DOMContentLoaded', loadMeetings);
</script>
{% endblock %}
